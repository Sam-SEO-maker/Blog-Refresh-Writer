name: Monday Indexation Report

on:
  schedule:
    # Lundi 5h UTC = 6h CET (hiver) / 7h CEST (ete)
    - cron: '0 5 * * 1'
  workflow_dispatch: {}  # Declenchement manuel possible

jobs:
  indexation-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google SA credentials
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          mkdir -p ~/.credentials/google
          printf '%s' "$GOOGLE_SA_JSON" > ~/.credentials/google/google-service-account.json

      - name: Run Monday Indexation Report
        env:
          GOOGLE_SA_PATH: ~/.credentials/google/google-service-account.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python content_writer.py report monday-indexation --save-json

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monday-report-${{ github.run_id }}
          path: outputs/reports/monday_report_*.json
          retention-days: 30
